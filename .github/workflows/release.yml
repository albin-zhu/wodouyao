name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-server:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            label: linux-x86_64
            ext: ''
          - platform: macos-latest
            label: macos-aarch64
            ext: ''
          - platform: windows-latest
            label: windows-x86_64
            ext: .exe
    runs-on: ${{ matrix.platform }}
    name: Server (${{ matrix.label }})
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          shared-key: server-${{ matrix.label }}
      - name: Build frontend
        run: npm ci && npm run build
      - name: Build wodouyao-server
        run: cargo build --manifest-path src-tauri/Cargo.toml --no-default-features --features web-runtime --bin wodouyao-server --release
      - name: Package server + dist
        shell: bash
        run: |
          BUNDLE="wodouyao-server-${{ matrix.label }}"
          mkdir -p "$BUNDLE"
          cp "src-tauri/target/release/wodouyao-server${{ matrix.ext }}" "$BUNDLE/"
          cp -r dist "$BUNDLE/dist"
          if [ "${{ matrix.ext }}" = ".exe" ]; then
            7z a "${BUNDLE}.zip" "$BUNDLE"
            echo "ASSET=${BUNDLE}.zip" >> "$GITHUB_ENV"
          else
            tar -czf "${BUNDLE}.tar.gz" "$BUNDLE"
            echo "ASSET=${BUNDLE}.tar.gz" >> "$GITHUB_ENV"
          fi
      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          draft: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: ${{ env.ASSET }}

  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            rust-targets: ''
            args: ''
            label: linux-x86_64

          - platform: macos-latest
            rust-targets: aarch64-apple-darwin
            args: --target aarch64-apple-darwin
            label: macos-aarch64

          - platform: windows-latest
            rust-targets: ''
            args: ''
            label: windows-x86_64

    runs-on: ${{ matrix.platform }}
    name: Build (${{ matrix.label }})

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Build wodouyao-server sidecar
        shell: bash
        run: |
          TARGET_FLAG=""
          RELEASE_DIR="src-tauri/target/release"
          if [ -n "${{ matrix.rust-targets }}" ]; then
            TARGET_FLAG="--target ${{ matrix.rust-targets }}"
            RELEASE_DIR="src-tauri/target/${{ matrix.rust-targets }}/release"
          fi
          cargo build --manifest-path src-tauri/Cargo.toml \
            --no-default-features --features web-runtime \
            --bin wodouyao-server --release $TARGET_FLAG
          # Tauri bundles the binary using the src/bin/ file stem ("server")
          if [ -f "$RELEASE_DIR/wodouyao-server.exe" ]; then
            cp "$RELEASE_DIR/wodouyao-server.exe" "$RELEASE_DIR/server.exe"
          else
            cp "$RELEASE_DIR/wodouyao-server" "$RELEASE_DIR/server"
          fi

      - name: Build and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Wodouyao ${{ github.ref_name }}
          releaseBody: |
            ## Download

            | Platform | File |
            |---|---|
            | macOS (Apple Silicon) | `Wodouyao_*_aarch64.dmg` |
            | Linux | `wodouyao_*_amd64.deb` / `Wodouyao_*_amd64.AppImage` |
            | Windows | `Wodouyao_*_x64-setup.exe` / `Wodouyao_*_x64_en-US.msi` |
          releaseDraft: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          args: ${{ matrix.args }}
